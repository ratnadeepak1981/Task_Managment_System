<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Management Dashboard</title>
    <!-- External Style Sheet Link -->
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    
    <!-- Main Section Module -->
    <div class="main-panel">
        <div class="top-row">
            <h1>Metrics Dashboard</h1>
            <div class="user-info">Core Connected</div>
        </div>

        <div class="content-body">
            <!-- System Error Indicator Alert Banner -->
            <div id="errorBanner" class="error-message" style="display: none;"></div>

            <!-- Blazor Enterprise App Statistics Metrics Grid -->
            <div class="dashboard-grid">
                <div class="card">
                    <h3>Total Tasks</h3>
                    <div id="countTotal" class="count">0</div>
                </div>
                <div class="card todo">
                    <h3>Todo</h3>
                    <div id="countTodo" class="count">0</div>
                </div>
                <div class="card progress">
                    <h3>In Progress</h3>
                    <div id="countProgress" class="count">0</div>
                </div>
                <div class="card done">
                    <h3>Done</h3>
                    <div id="countDone" class="count">0</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts Injection Logic -->
    <script src="TaskService.js"></script>
    <script>
        const URL = "http://localhost:5108/api"; 
        const taskService = new TaskService(URL);

        document.addEventListener('DOMContentLoaded', async () => {
            const errorBanner = document.getElementById('errorBanner');
            const countTotal = document.getElementById('countTotal');
            const countTodo = document.getElementById('countTodo');
            const countProgress = document.getElementById('countProgress');
            const countDone = document.getElementById('countDone');

            try {
                const apiResponse = await taskService.getAllTasks();
                
                if (!apiResponse) {
                    throw new Error("Unable to read task collection data stream from server.");
                }

                // FIX: Extract the inner array from the response wrapper object (.data)
                // Fallback to apiResponse if it's already an array, or empty array if null
                const rawTasks = apiResponse.data || apiResponse;
                const taskArray = Array.isArray(rawTasks) ? rawTasks : [rawTasks];
                
                let todoCounter = 0;
                let progressCounter = 0;
                let doneCounter = 0;

                taskArray.forEach(task => {
                    if (!task || typeof task !== 'object') return; 

                    const statusStr = (task.status || '').trim().toLowerCase();
                    
                    if (statusStr === 'todo' || statusStr === 'pending' || statusStr === 'not started') {
                        todoCounter++;
                    } else if (statusStr === 'in progress' || statusStr === 'inprogress' || statusStr === 'active') {
                        progressCounter++;
                    } else if (statusStr === 'done' || statusStr === 'completed') {
                        doneCounter++;
                    }
                });

                const validTaskCount = taskArray.filter(t => t && typeof t === 'object').length;

                // Sync UI elements
                countTotal.innerText = validTaskCount;
                countTodo.innerText = todoCounter;
                countProgress.innerText = progressCounter;
                countDone.innerText = doneCounter;

            } catch (err) {
                console.error("[Dashboard Load Error]", err);
                errorBanner.innerText = "Error loading metrics: Please verify your Core API server is online.";
                errorBanner.style.display = 'block';
            }
        });
    </script>
</body>
</html>
