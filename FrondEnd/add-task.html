<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create New Task</title>
    <!-- Core global layout rules stylesheet link -->
    <link rel="stylesheet" href="tasks.css">
    <!-- Component layout panel stylesheet link -->
    <link rel="stylesheet" href="add-task.css">
</head>
<body>

    <div class="nav">
        <h2>Task Workspace</h2>
        <a href="Tasks.html">← View All Tasks</a>
    </div>

    <div class="form-container">
        <h2>Create New Task</h2>
        <form id="createTaskForm">
            
            <div class="form-group">
                <label for="taskTitle">Task Title</label>
                <input type="text" id="taskTitle" required placeholder="e.g., Fix Navigation Bug">
            </div>

            <div class="form-group">
                <label for="taskDescription">Description</label>
                <textarea id="taskDescription" class="textarea-input" rows="4" placeholder="Describe the details of this task..."></textarea>
            </div>

            <!-- Dynamic User Dropdown Selector -->
            <div class="form-group">
                <label for="userSelect">Assign to User</label>
                <select id="userSelect" required>
                    <option value="" disabled selected>Loading active users...</option>
                </select>
            </div>

            <div class="form-group">
                <label for="taskStatus">Initial Status</label>
                <select id="taskStatus">
                    <option value="Todo">Todo</option>
                    <option value="In Progress">In Progress</option>
                    <option value="Done">Done</option>
                </select>
            </div>

            <button type="submit" class="btn btn-save" style="margin-top: 10px;">Create Task Record</button>
        </form>
    </div>

    <!-- Scripts Integration Layer -->
    <script src="TaskService.js"></script>
    <script>
        const API_URL = "http://localhost:5108/api";
        const taskService = new TaskService(API_URL);
        
        let loadedUsers = [];

        document.addEventListener('DOMContentLoaded', () =>
        {
            loadUsersDropdown();
            document.getElementById('createTaskForm').addEventListener('submit', handleTaskCreation);
        });

        // 1. Fetch live system users from your API layer 
        async function loadUsersDropdown()
         {
            const userSelect = document.getElementById('userSelect');
            
            try
            {
                const response = await fetch(`${API_URL}/user`);
                if (!response.ok) throw new Error("Could not resolve users directory stream.");
                
                const jsonResult = await response.json();
                
                if (jsonResult && jsonResult.data) 
                {
                    loadedUsers = Array.isArray(jsonResult.data) ? jsonResult.data : [jsonResult.data];
                }
                else
                {
                    loadedUsers = Array.isArray(jsonResult) ? jsonResult : [];
                }

                userSelect.innerHTML = '<option value="" disabled selected>-- Select a team member --</option>';

                if (loadedUsers.length === 0) 
                {
                    userSelect.innerHTML = '<option value="" disabled>No registered users found</option>';
                    return;
                }

                loadedUsers.forEach(user =>
                {
                    const option = document.createElement('option');
                    option.value = user.userId || user.id;
                    option.innerText = user.userName || user.username;
                    userSelect.appendChild(option);
                });

            } catch (error)
            {
                console.error("User dropdown instantiation trace error:", error);
                userSelect.innerHTML = '<option value="" disabled style="color:red;">Failed to populate directory entries.</option>';
            }
        }

        // 2. Transmit the structured Task configuration via a POST request body
        async function handleTaskCreation(e)
        {
            e.preventDefault();

            const selectedUserId = parseInt(document.getElementById('userSelect').value);
            const matchingUser = loadedUsers.find(u => (u.userId || u.id) === selectedUserId);

            const taskDto = {
                title: document.getElementById('taskTitle').value.trim(),
                description: document.getElementById('taskDescription').value.trim(),
                status: document.getElementById('taskStatus').value,
                userId: selectedUserId,
                userName: matchingUser ? (matchingUser.userName || matchingUser.username) : "Unassigned"
            };

            try 
            {
                // 1. Create a native FormData instance instead of a plain JavaScript object
                const formData = new FormData();
                formData.append('title', document.getElementById('taskTitle').value.trim());
                formData.append('description', document.getElementById('taskDescription').value.trim());
                formData.append('status', document.getElementById('taskStatus').value);
                formData.append('userId', selectedUserId);
                formData.append('userName', matchingUser ? (matchingUser.userName || matchingUser.username) : "Unassigned");

                // 2. Transmit the FormData object directly
                const response = await fetch(`${API_URL}/Task`, 
                {
                    method: 'POST',
                    // ⚠️ CRITICAL: DO NOT set the 'Content-Type' header here. 
                    // The browser will automatically inject multipart/form-data with the correct boundary string.
                    body: formData 
                });

                if (!response.ok)
                {
                    const errDetails = await response.text();
                    console.error(`[Server Validation Error] Status: ${response.status}`);
                    console.error(`[Server Response Body]:`, errDetails);
                    throw new Error(`API rejected the creation attempt with status ${response.status}.`);
                }

                alert("Task assigned and recorded successfully!");
                document.getElementById('createTaskForm').reset();
                window.location.href = "Tasks.html";

            } 

        
            catch(error)
            {
                console.log(error);
            }
        }    
    </script>
</body>
</html>
