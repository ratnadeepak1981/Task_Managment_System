<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks Board</title>
    <!-- Linked external stylesheet reference -->
    <link rel="stylesheet" href="tasks.css">
</head>
<body>

    <div class="nav">
        <h2>Task Workspace</h2>
        <a href="index.html">← Back to Dashboard</a>
    </div>

    <div class="container">
        <!-- Search Field -->
        <input type="text" id="searchBar" class="search-box" placeholder="Type here to search tasks or usernames...">

        <!-- Tasks Table -->
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Task Title</th>
                    <th>Assigned User</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="taskTableBody">
                <tr><td colspan="5" style="text-align:center;">Loading tasks from server...</td></tr>
            </tbody>
        </table>
    </div>

    <!-- Wireframe Scripts Layer -->
    <script src="TaskService.js"></script>
    <script>
        const API_URL = "http://localhost:5108/api";
        const taskService = new TaskService(API_URL);
        let allTasks = [];

        document.addEventListener('DOMContentLoaded', () => {
            loadTasksFromServer();
            document.getElementById('searchBar').addEventListener('input', filterTasks);
        });

        async function loadTasksFromServer() {
            try {
                const response = await taskService.getAllTasks();
                
                if (response && response.data) {
                    allTasks = response.data;
                } else {
                    allTasks = Array.isArray(response) ? response : [];
                }
                
                displayTasks(allTasks);
            } catch (error) {
                console.error("Error fetching tasks:", error);
                document.getElementById('taskTableBody').innerHTML = `<tr><td colspan="5" style="text-align:center; color:red;">Failed to connect to API server.</td></tr>`;
            }
        }

        function displayTasks(tasksList) {
            const tbody = document.getElementById('taskTableBody');
            tbody.innerHTML = '';

            if (tasksList.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;">No matching tasks found.</td></tr>`;
                return;
            }

            tasksList.forEach(task => {
                const id = task.taskId || task.id;
                const title = task.title || 'Untitled';
                const name = task.userName || task.username || 'Unassigned';
                const currentStatus = task.status || 'Todo';

                let styleClass = 'todo';
                if (currentStatus.toLowerCase().includes('progress')) styleClass = 'progress';
                if (currentStatus.toLowerCase() === 'done' || currentStatus.toLowerCase() === 'completed') styleClass = 'done';

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>#${id}</td>
                    <td><strong>${title}</strong></td>
                    <td>${name}</td>
                    <td>
                        <span class="badge ${styleClass}">${currentStatus}</span>
                        <span class="cycle-icon" title="Quick change status" onclick="toggleQuickStatus(${id}, '${currentStatus}')">🔄</span>
                    </td>
                    <td>
                        <!-- Redirects straight to edit-task.html with the taskId embedded in the URL -->
                        <button class="btn btn-edit" onclick="window.location.href='edit-task.html?taskId=${id}'">✏️ Edit</button>
                        <button class="btn btn-delete" onclick="deleteTaskRow(${id})">🗑️ Delete</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function filterTasks() {
            const text = document.getElementById('searchBar').value.toLowerCase();
            const filtered = allTasks.filter(t => {
                return (t.title || '').toLowerCase().includes(text) || 
                       (t.userName || t.username || '').toLowerCase().includes(text);
            });
            displayTasks(filtered);
        }

        async function toggleQuickStatus(id, currentStatus) {
            let nextStatus = "Todo";
            if (currentStatus === "Todo") nextStatus = "In Progress";
            else if (currentStatus === "In Progress") nextStatus = "Done";

            const taskObj = allTasks.find(t => (t.taskId || t.id) === id);
            if (!taskObj) return;

            const formData = new FormData();
            formData.append('taskId', id);
            formData.append('title', taskObj.title || '');
            formData.append('description', taskObj.description || '');
            formData.append('status', nextStatus);
            formData.append('userId', taskObj.userId || taskObj.id || 0);
            formData.append('userName', taskObj.userName || taskObj.username || '');

            try {
                const response = await fetch(`${API_URL}/Task/${id}`, {
                    method: 'PUT',
                    body: formData
                });
                if (response.ok) {
                    loadTasksFromServer();
                } else {
                    console.error("Status update error code:", response.status);
                }
            } catch (err) {
                alert("Failed updating quick status.");
            }
        }

        async function deleteTaskRow(id) {
            if (!confirm("Are you sure you want to delete this task permanently?")) return;

            try {
                const response = await fetch(`${API_URL}/Task/${id}`, {
                    method: 'DELETE'
                });
                if (response.ok) {
                    loadTasksFromServer();
                } else {
                    alert(`Delete action rejected by backend server. Status: ${response.status}`);
                }
            } catch (err) {
                alert("Could not delete task item record.");
            }
        }
    </script>
</body>
</html>
