<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Management System</title>
    <!-- Linked external stylesheet reference -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Blazor Enterprise Sidebar Navigation Layer Panel -->
    <div class="blazor-sidebar">
        <div class="sidebar-brand">Task Portal App</div>
        <ul class="sidebar-menu">
            <li class="sidebar-item">
                <a class="sidebar-link active" onclick="navigateToFrame('dashboard.html', this)">📊 Metrics Dashboard</a>
            </li>
            <li class="sidebar-item">
                <a class="sidebar-link" onclick="navigateToFrame('tasks.html', this)">📋 View System Tasks</a>
            </li>
            <li class="sidebar-item">
                <a class="sidebar-link" onclick="navigateToFrame('add-task.html', this)">➕ Assign New Task</a>
            </li>
            <li class="sidebar-item">
                <a class="sidebar-link" onclick="navigateToFrame('users.html', this)">👥 User Accounts Directory</a>
            </li>
             <!-- 🚀 ADD THIS NEW VISIBLE LINK -->
             <li class="sidebar-item">
                 <a class="sidebar-link" onclick="navigateToFrame('user-detail.html?userId=1', this)">🔍 Inspect User Profile</a>
             </li>
        </ul>
    </div>

    <!-- Blazor Core Workpanel Display Context Viewport Frame -->
    <div class="blazor-main-workspace">
        <iframe id="appViewFrame" src="dashboard.html" class="workspace-frame"></iframe>
    </div>

    <!-- SPA Router Controller Script -->
    <script>
        function navigateToFrame(pageUrl, anchorElement) {
            // 1. Point the view viewport target stream to the matching document path
            document.getElementById('appViewFrame').src = pageUrl;

            // 2. Refresh active design class markers across the link tree nodes
            const links = document.querySelectorAll('.sidebar-link');
            links.forEach(link => link.classList.remove('active'));
            
            // 3. Highlight currently selected action option field elements if anchorElement exists
            if (anchorElement) {
                anchorElement.classList.add('active');
            }
        }

        // Support jumping straight to edit view context natively if required by application redirections
        window.navigateToEditTask = function(taskId) {
            const frame = document.getElementById('appViewFrame');
            frame.src = `edit-task.html?taskId=${taskId}`;
            
            // Sync side menu highlighting dynamically to "View System Tasks" state
            const links = document.querySelectorAll('.sidebar-link');
            links.forEach(link => link.classList.remove('active'));
            
            // Highlight the matching target row menu link item manually
            const taskLink = document.querySelector('a[onclick*="tasks.html"]');
            if (taskLink) taskLink.classList.add('active');
        }

        // 🚀 Support opening the specific user profile workspace details view within the frame container
        window.navigateToUserDetail = function(userId) {
            const frame = document.getElementById('appViewFrame');
            frame.src = `user-detail.html?userId=${userId}`;
            
            // Sync side menu highlighting dynamically to "User Accounts Directory" state
            const links = document.querySelectorAll('.sidebar-link');
            links.forEach(link => link.classList.remove('active'));
            
            // Highlight the user directory menu link item automatically
            const userLink = document.querySelector('a[onclick*="users.html"]');
            if (userLink) userLink.classList.add('active');
        }
    </script>

    <!-- Core Script Wireframe Pipeline Layers Intact -->
    <script src="Userservice.js"></script>
    <script src="Taskservice.js"></script>
    <script src="TaskEventManager.js"></script>
    <script src="main.js"></script>
</body>
</html>
