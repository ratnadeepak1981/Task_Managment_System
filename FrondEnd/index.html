<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Management System</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f9; color: #333; }
        .container { max-width: 900px; margin: auto; display: flex; gap: 20px; }
        .panel { flex: 1; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { border-bottom: 2px solid #ddd; padding-bottom: 5px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group select { width: 100%; padding: 8px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; padding: 10px 15px; cursor: pointer; border-radius: 4px; }
        button:hover { background: #0056b3; }
        .task-item { border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; border-radius: 4px; background: #fafafa; }
        .task-actions { margin-top: 10px; display: flex; gap: 5px; }
        .btn-delete { background: #dc3545; }
        .btn-delete:hover { background: #bd2130; }
        .btn-patch { background: #28a745; }
        .btn-patch:hover { background: #218838; }
        .search-box { margin-bottom: 20px; display: flex; gap: 10px; }
    </style>
</head>
<body>

    <h1>Task Management System</h1>

    <div class="search-box">
        <input type="text" id="searchName" placeholder="Search task by name...">
        <button id="btnSearch">Search</button>
        <button id="btnClearSearch" style="background:#6c757d;">Clear</button>
    </div>

    <div class="container">
        <!-- left Panel: Forms -->
        <div class="panel">
            <h2 id="formTitle">Create Task</h2>
            <form id="taskForm">
                <input type="hidden" id="taskId">
                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" required>
                </div>
                <div class="form-group">
                    <label for="description">Description</label>
                    <input type="text" id="description" required>
                </div>
                <div class="form-group">
                    <label for="assignedUserId">Assign User (ID)</label>
                    <input type="number" id="assignedUserId" required>
                </div>
                <button type="submit" id="btnSubmit">Save Task</button>
                <button type="button" id="btnCancelEdit" style="display:none; background:#6c757d;">Cancel</button>
            </form>
        </div>

        <!-- Right Panel: View List -->
        <div class="panel">
            <h2>Task List</h2>
            <div id="taskList"><!-- Tasks injected here --></div>
        </div>
    </div>

    <!-- Scripts Injection -->
    <script src="Userservice.js"></script>
    <script src="Taskservice.js"></script>
    <script src="Events.js"></script>
    <script src="main.js"></script>
</body>
</html>
